<html lang="en">
<head>
<meta charset="UTF-8">

<title>Ultra Dashboard — Sales Intelligence</title>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #111210;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #e8e5df;
    cursor: none;
    overflow-x: hidden;
  }

  /* ── Custom Cursor ── */
  #cursor {
    position: fixed; width: 10px; height: 10px;
    background: #5dcaa5; border-radius: 50%;
    pointer-events: none; z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.08s ease, opacity 0.2s;
    mix-blend-mode: screen;
  }
  #cursor-glow {
    position: fixed; width: 340px; height: 340px;
    background: radial-gradient(circle, rgba(93,202,165,0.07) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none; z-index: 9998;
    transform: translate(-50%, -50%);
    transition: left 0.18s ease, top 0.18s ease;
  }

  /* ── Marquee ── */
  .marquee-wrap {
    width: 100%; overflow: hidden;
    background: rgba(93,202,165,0.04);
    border-bottom: 1px solid rgba(93,202,165,0.08);
    padding: 8px 0; white-space: nowrap;
  }
  @keyframes marquee { from { transform: translateX(0) } to { transform: translateX(-50%) } }
  .marquee-track {
    display: inline-flex; gap: 0;
    animation: marquee 38s linear infinite;
  }
  .marquee-track:hover { animation-play-state: paused; }
  .marquee-item {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; letter-spacing: 0.07em; padding: 0 32px;
    text-transform: uppercase;
  }
  .marquee-item .sep { color: rgba(255,255,255,0.15); margin: 0 4px; }
  .pos { color: #5dcaa5; } .neg { color: #d85a30; } .neu { color: #9a9790; }

  /* ── Dashboard Wrapper ── */
  .db {
    padding: 1.1rem 1.25rem 1.5rem;
    position: relative; max-width: 1200px; margin: 0 auto;
  }

  /* ── Background Canvas ── */
  #bgCanvas {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
  }
  .content { position: relative; z-index: 1; }

  /* ── Header ── */
  @keyframes fadeUp { from { opacity:0; transform:translateY(16px) } to { opacity:1; transform:translateY(0) } }
  .hdr {
    display: flex; justify-content: space-between; align-items: flex-end;
    margin-bottom: 1.1rem;
    animation: fadeUp 0.55s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  .dtitle { font-size: 15px; font-weight: 500; color: #e8e5df; letter-spacing: 0.01em; }
  .dsub { font-size: 11px; color: #3a3935; margin-top: 2px; }
  @keyframes pulse { 0%,100%{opacity:0.35} 50%{opacity:1} }
  .live-dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: #5dcaa5; margin-right: 5px;
    animation: pulse 2s ease-in-out infinite;
  }
  .filters { display: flex; gap: 8px; align-items: center; }
  .filters label { font-size: 11px; color: #4a4945; }
  .filters select {
    font-size: 11px; padding: 5px 10px; border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.06);
    background: rgba(22,22,20,0.8); color: #c8c5bf; outline: none; cursor: pointer;
    transition: border-color 0.2s;
  }
  .filters select:hover { border-color: rgba(93,202,165,0.3); }

  /* ── KPI Grid ── */
  .kgrid { display: grid; grid-template-columns: repeat(4,minmax(0,1fr)); gap: 10px; margin-bottom: 1.1rem; }

  /* ── Glassmorphism Base ── */
  .glass {
    background: rgba(22,22,20,0.7);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 12px;
  }

  /* ── KPI Cards ── */
  .kpi {
    padding: 14px 16px; position: relative; overflow: hidden;
    cursor: default;
    transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1),
                border-color 0.22s ease,
                box-shadow 0.22s ease;
  }
  .kpi:hover {
    transform: scale(1.03) translateY(-2px);
    border-color: rgba(93,202,165,0.35);
    box-shadow: 0 0 22px rgba(93,202,165,0.08), 0 8px 24px rgba(0,0,0,0.4);
  }
  .kpi:hover .kpi-shine { animation-duration: 0.6s !important; }

  @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
  .kpi-shine {
    position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
    background: linear-gradient(90deg,transparent,rgba(255,255,255,0.04),transparent);
    background-size: 200% 100%;
    animation: shimmer 3s ease infinite;
    pointer-events: none;
  }
  .kl { font-size: 10px; color: #4a4945; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
  .kv { font-size: 20px; font-weight: 500; color: #e8e5df; line-height: 1; font-variant-numeric: tabular-nums; }
  .kv.accent { color: #5dcaa5; }
  .kd { font-size: 11px; margin-top: 5px; }
  .up { color: #5dcaa5; } .down { color: #d85a30; }

  /* ── Chart Grid ── */
  .cgrid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .cc {
    padding: 14px 16px;
    transition: border-color 0.25s ease, box-shadow 0.25s ease;
  }
  .cc:hover {
    border-color: rgba(255,255,255,0.09);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .ct { font-size: 10px; font-weight: 500; color: #5a5955; margin-bottom: 9px; text-transform: uppercase; letter-spacing: 0.07em; }
  .cw { position: relative; width: 100%; }
  .leg { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; font-size: 11px; color: #5a5955; }
  .ld { width: 8px; height: 8px; border-radius: 2px; display: inline-block; margin-right: 3px; flex-shrink: 0; }

  /* ── Staggered entrance ── */
  .stagger { opacity: 0; }
  @keyframes staggerIn {
    from { opacity:0; transform:translateY(20px) scale(0.97) }
    to   { opacity:1; transform:translateY(0) scale(1) }
  }
  .stagger.go {
    animation: staggerIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  /* ── Divider & Summary ── */
  .divider { border: none; border-top: 1px solid rgba(255,255,255,0.04); margin: 1rem 0; }
  .slbl { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: #3a3935; margin-bottom: 10px; }

  /* ── Highlight / Lowlight Cards ── */
  .hlg { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .hc { border-radius: 12px; padding: 14px 16px; position: relative; overflow: hidden; }
  .hc.hi { background: rgba(11,26,16,0.85); border: 1px solid rgba(29,110,56,0.4); backdrop-filter: blur(10px); }
  .hc.lo { background: rgba(26,13,13,0.85); border: 1px solid rgba(74,26,26,0.5); backdrop-filter: blur(10px); }
  .hh { display: flex; align-items: center; gap: 6px; font-size: 10px; font-weight: 500; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.07em; }
  .hc.hi .hh { color: #5dcaa5; } .hc.lo .hh { color: #d85a30; }
  .hi-item { display: flex; gap: 8px; margin-bottom: 8px; align-items: flex-start; }
  .dot { width: 4px; height: 4px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
  .hi .dot { background: #5dcaa5; } .lo .dot { background: #d85a30; }
  .ht { font-size: 12px; color: #a8a5a0; line-height: 1.5; }
  .ht strong { font-weight: 500; display: block; color: #d8d5cf; font-size: 12px; }
  .ht span { color: #4a4945; font-size: 11px; }
</style>
</head>

<!-- Custom cursor -->
<div id="cursor"></div>
<div id="cursor-glow"></div>

<!-- Background particle canvas -->

<div class="db">

    <!-- Charts row 2 -->

        <div class="cw" style="height:165px"><canvas id="rc" role="img" aria-label="Revenue by region"></canvas></div>

      <div class="cc glass stagger" id="cc3">

        <div class="leg" id="retl"></div>
        <div class="cw" style="height:165px"><canvas id="retc" role="img" aria-label="Units per retailer"></canvas></div>
      </div>
    </div>

    <hr class="divider">
    <p class="slbl">Intelligence summary</p>
    <div class="hlg" id="hlg"></div>

  </div>
</div>

/* ── PARTICLE BG ── */
(function initBg(){
  const canvas = document.getElementById('bgCanvas');
  const ctx = canvas.getContext('2d');
  let W, H, pts = [];
  function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  for(let i=0;i<45;i++) pts.push({
    x:Math.random()*1400, y:Math.random()*900,
    vx:(Math.random()-.5)*.15, vy:(Math.random()-.5)*.15,
    r:Math.random()*1.3+.3, op:Math.random()*.22+.04
  });
  function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0||p.x>W) p.vx*=-1;
      if(p.y<0||p.y>H) p.vy*=-1;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(93,202,165,${p.op})`; ctx.fill();
    });
    for(let i=0;i<pts.length;i++) for(let j=i+1;j<pts.length;j++){
      const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y, d=Math.sqrt(dx*dx+dy*dy);
      if(d<95){
        ctx.beginPath(); ctx.moveTo(pts[i].x,pts[i].y); ctx.lineTo(pts[j].x,pts[j].y);
        ctx.strokeStyle=`rgba(93,202,165,${.055*(1-d/95)})`; ctx.lineWidth=.5; ctx.stroke();
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ── HELPERS ── */
function fmtM(v){ return '$'+Math.round(v/1000)+'K'; }
function fmtB(v){ return '$'+(v/1000000).toFixed(2)+'M'; }
function gf(){
  const y=document.getElementById('yf').value, r=document.getElementById('rf').value;
  return allRows.filter(d=>(y==='all'||d.year===y)&&(r==='all'||d.region===r));
}
function animCount(el,target,pre,suf,dur){
  const start=Date.now();
  (function tick(){
    const p=Math.min(1,(Date.now()-start)/dur);
    const e=1-Math.pow(1-p,3);
    const v=Math.round(target*e);
    el.textContent=pre+(v>=1000?v.toLocaleString():v)+suf;
    if(p<1) requestAnimationFrame(tick);
  })();
}
function mkLeg(id,items){
  document.getElementById(id).innerHTML=items.map(([l,c])=>
    `<span style="display:flex;align-items:center;gap:3px"><span class="ld" style="background:${c}"></span>${l}</span>`
  ).join('');
}
function dc(id){ if(charts[id]){ charts[id].destroy(); delete charts[id]; } }
function triggerStagger(){
  document.querySelectorAll('.stagger').forEach((el,i)=>{
    el.classList.remove('go'); void el.offsetWidth;
    el.style.animationDelay = (i*0.09)+'s';
    el.classList.add('go');
  });
}

/* ── MARQUEE ── */
function buildMarquee(data){
  const brands=['Nike','Adidas','Puma'];
  const regions=['North','South','East','West'];
  const bRevs=Object.fromEntries(brands.map(b=>[b,data.filter(d=>d.brand===b).reduce((s,d)=>s+d.revenue,0)]));
  const rRevs=Object.fromEntries(regions.map(r=>[r,data.filter(d=>d.region===r).reduce((s,d)=>s+d.revenue,0)]));
  const totalRev=data.reduce((s,d)=>s+d.revenue,0);
  const totalUnits=data.reduce((s,d)=>s+d.units,0);
  const topBrand=brands.sort((a,b)=>bRevs[b]-bRevs[a])[0];
  const topRegion=regions.sort((a,b)=>rRevs[b]-rRevs[a])[0];
  const botRegion=regions.sort((a,b)=>rRevs[a]-rRevs[b])[0];
  const nikeShare=Math.round(bRevs['Nike']/totalRev*100);
  const items=[
    {txt:`${topBrand} dominates at ${nikeShare}% revenue share`, cls:'pos'},
    {txt:`Total portfolio: ${fmtB(totalRev)} across ${totalUnits.toLocaleString()} units`, cls:'neu'},
    {txt:`${topRegion} region leads all geographies`, cls:'pos'},
    {txt:`${botRegion} region needs strategic attention`, cls:'neg'},
    {txt:`Avg order value: $${Math.round(totalRev/totalUnits)} per unit`, cls:'neu'},
    {txt:`Puma avg unit price trails Nike by 30%+`, cls:'neg'},
    {txt:`Adidas holding steady across all channels`, cls:'neu'},
    {txt:`${topBrand} dominates at ${nikeShare}% revenue share`, cls:'pos'},
    {txt:`Total portfolio: ${fmtB(totalRev)} across ${totalUnits.toLocaleString()} units`, cls:'neu'},
    {txt:`${topRegion} region leads all geographies`, cls:'pos'},
    {txt:`${botRegion} region needs strategic attention`, cls:'neg'},
    {txt:`Avg order value: $${Math.round(totalRev/totalUnits)} per unit`, cls:'neu'},
    {txt:`Puma avg unit price trails Nike by 30%+`, cls:'neg'},
    {txt:`Adidas holding steady across all channels`, cls:'neu'},
  ];
  document.getElementById('marqueeTrack').innerHTML = items.map(it=>
    `<span class="marquee-item"><span class="${it.cls}">${it.txt}</span><span class="sep">·</span></span>`
  ).join('');
}

/* ── BASE CHART OPTIONS ── */
function baseOpts(){
  return { responsive:true, maintainAspectRatio:false,
    animation:{ duration:750, easing:'easeInOutQuart' },
    plugins:{ legend:{display:false} },
    scales:{
      x:{ ticks:{color:TC,font:{size:10}}, grid:{color:GC}, border:{color:'transparent'} },
      y:{ ticks:{color:TC,font:{size:10}}, grid:{color:GC}, border:{color:'transparent'} }
    }
  };
}

/* ── RENDER ── */
function render(){
  const data = gf();
  renderKPIs(data);
  renderTrend(data);
  renderBrand(data);
  renderRegion(data);
  renderRetailer(data);
  renderHL(data);
  buildMarquee(data);
  triggerStagger();
}

function renderKPIs(data){
  const rev=data.reduce((s,d)=>s+d.revenue,0);
  const units=data.reduce((s,d)=>s+d.units,0);
  const aov=rev/units;
  const days=new Set(data.map(d=>d.date)).size;
  const y=document.getElementById('yf').value;
  let d1='',d2='';
  if(y==='2024'){
    const d23=allRows.filter(d=>d.year==='2023');
    const r23=d23.reduce((s,d)=>s+d.revenue,0);
    const u23=d23.reduce((s,d)=>s+d.units,0);
    const p=((rev-r23)/r23*100).toFixed(1);
    const up=((units-u23)/u23*100).toFixed(1);
    d1=`<div class="kd ${+p>=0?'up':'down'}">${+p>=0?'▲':'▼'} ${Math.abs(p)}% vs 2023</div>`;
    d2=`<div class="kd ${+up>=0?'up':'down'}">${+up>=0?'▲':'▼'} ${Math.abs(up)}% vs 2023</div>`;
  }
  const kpis=[
    {label:'Total revenue',id:'kv0',target:Math.round(rev/1000),pre:'$',suf:'K',delta:d1,accent:true},
    {label:'Units sold',id:'kv1',target:units,pre:'',suf:'',delta:d2,accent:false},
    {label:'Avg order value',id:'kv2',target:Math.round(aov),pre:'$',suf:'',delta:'',accent:false},
    {label:'Revenue / day',id:'kv3',target:Math.round(rev/days/1000),pre:'$',suf:'K',delta:'',accent:false},
  ];
  document.getElementById('kg').innerHTML=kpis.map((k,i)=>`
    <div class="kpi glass stagger" id="kpi${i}">
      <div class="kpi-shine"></div>
      <div class="kl">${k.label}</div>
      <div class="kv${k.accent?' accent':''}" id="${k.id}">—</div>
      ${k.delta}
    </div>`).join('');
  kpis.forEach((k,i)=>setTimeout(()=>{
    const el=document.getElementById(k.id);
    if(el) animCount(el,k.target,k.pre,k.suf,850);
  },i*80+300));
}

function renderTrend(data){
  const id='tc', y=document.getElementById('yf').value;
  const years=y==='all'?['2023','2024']:[y];
  const yc={'2023':'#5dcaa5','2024':'#7F77DD'};
  const newData=years.map(yr=>{
    const m=Array(12).fill(0);
    data.filter(d=>d.year===yr).forEach(d=>{m[d.month-1]+=d.revenue;});
    return m.map(v=>Math.round(v));
  });
  mkLeg('tl',years.map(yr=>[yr,yc[yr]]));
  if(charts[id]){
    charts[id].data.datasets.forEach((ds,i)=>{ ds.data=newData[i]||[]; });
    charts[id].update(600); return;
  }
  const opts=baseOpts();
  opts.scales.y.ticks.callback=v=>'$'+Math.round(v/1000)+'K';
  opts.scales.x.ticks.autoSkip=false;
  charts[id]=new Chart(document.getElementById(id),{ type:'line',
    data:{ labels:MONTHS, datasets:years.map(yr=>({
      label:yr, data:data.filter(d=>d.year===yr).reduce((acc,d)=>{ acc[d.month-1]+=d.revenue; return acc; },Array(12).fill(0)).map(v=>Math.round(v)),
      borderColor:yc[yr], backgroundColor:yc[yr]+'18', fill:true, tension:0.4,
      pointRadius:4, pointBackgroundColor:yc[yr], pointBorderColor:'#111210', pointBorderWidth:2,
      borderDash:yr==='2023'?[4,3]:[]
    }))}, options:opts });
}

function renderBrand(data){
  const id='bc', brands=['Nike','Adidas','Puma'];
  const revs=brands.map(b=>Math.round(data.filter(d=>d.brand===b).reduce((s,d)=>s+d.revenue,0)));
  mkLeg('bl',brands.map((b,i)=>[b+' '+fmtM(revs[i]),BC[b]]));
  if(charts[id]){
    charts[id].data.datasets[0].data=revs;
    charts[id].update(700); return;
  }
  const opts=baseOpts();
  opts.indexAxis='y';
  opts.scales.x.ticks.callback=v=>'$'+Math.round(v/1000)+'K';
  opts.scales.y.grid={display:false};
  opts.animation={duration:900,easing:'easeOutBack'};
  /* bar hover: dim others */
  opts.onHover=(evt,els,chart)=>{
    chart.data.datasets[0].backgroundColor=brands.map((_,i)=>
      els.length===0||els[0].index===i ? BC[brands[i]]+'cc' : BC[brands[i]]+'30'
    );
    chart.update('none');
  };
  charts[id]=new Chart(document.getElementById(id),{ type:'bar',
    data:{ labels:brands, datasets:[{
      data:revs, backgroundColor:brands.map(b=>BC[b]+'cc'),
      borderColor:brands.map(b=>BC[b]), borderWidth:1, borderRadius:4, borderSkipped:false
    }]}, options:opts });
}

function renderRegion(data){
  const id='rc', regions=['North','South','East','West'];
  const revs=regions.map(r=>Math.round(data.filter(d=>d.region===r).reduce((s,d)=>s+d.revenue,0)));
  const total=revs.reduce((a,b)=>a+b,0);
  mkLeg('rl',regions.map((r,i)=>[r+' '+Math.round(revs[i]/total*100)+'%',RC[r]]));
  if(charts[id]){
    charts[id].data.datasets[0].data=revs;
    charts[id].update(700); return;
  }
  charts[id]=new Chart(document.getElementById(id),{ type:'doughnut',
    data:{ labels:regions, datasets:[{
      data:revs, backgroundColor:regions.map(r=>RC[r]+'cc'),
      borderColor:regions.map(r=>RC[r]), borderWidth:1.5, hoverOffset:8
    }]},
    options:{ responsive:true, maintainAspectRatio:false, cutout:'65%',
      animation:{animateRotate:true,animateScale:true,duration:900,easing:'easeOutQuart'},
      plugins:{legend:{display:false}} }
  });
}

function renderRetailer(data){
  const id='retc', retailers=['Amazon','Walmart','Target'];
  const units=retailers.map(r=>data.filter(d=>d.retailer===r).reduce((s,d)=>s+d.units,0));
  mkLeg('retl',retailers.map((r,i)=>[r+' '+units[i].toLocaleString(),RTC[r]]));
  if(charts[id]){
    charts[id].data.datasets[0].data=units;
    charts[id].update(700); return;
  }
  const opts=baseOpts();
  opts.scales.x.grid={display:false};
  opts.scales.y.ticks.callback=v=>v.toLocaleString();
  opts.animation={duration:900,easing:'easeOutBack'};
  charts[id]=new Chart(document.getElementById(id),{ type:'bar',
    data:{ labels:retailers, datasets:[{
      data:units, backgroundColor:retailers.map(r=>RTC[r]+'cc'),
      borderColor:retailers.map(r=>RTC[r]), borderWidth:1, borderRadius:5, borderSkipped:false
    }]}, options:opts });
}

function renderHL(data){
  const brands=['Nike','Adidas','Puma'], regions=['North','South','East','West'], retailers=['Amazon','Walmart','Target'];
  const bRevs=Object.fromEntries(brands.map(b=>[b,data.filter(d=>d.brand===b).reduce((s,d)=>s+d.revenue,0)]));
  const rRevs=Object.fromEntries(regions.map(r=>[r,data.filter(d=>d.region===r).reduce((s,d)=>s+d.revenue,0)]));
  const retU=Object.fromEntries(retailers.map(r=>[r,data.filter(d=>d.retailer===r).reduce((s,d)=>s+d.units,0)]));
  const sb=brands.slice().sort((a,b)=>bRevs[b]-bRevs[a]);
  const sr=regions.slice().sort((a,b)=>rRevs[b]-rRevs[a]);
  const sret=retailers.slice().sort((a,b)=>retU[b]-retU[a]);
  const nikeAOV=data.filter(d=>d.brand==='Nike').reduce((s,d)=>s+d.revenue/d.units,0)/Math.max(1,data.filter(d=>d.brand==='Nike').length);
  const pumaAOV=data.filter(d=>d.brand==='Puma').reduce((s,d)=>s+d.revenue/d.units,0)/Math.max(1,data.filter(d=>d.brand==='Puma').length);
  const total=Object.values(rRevs).reduce((a,b)=>a+b,0);
  const totalU=Object.values(retU).reduce((a,b)=>a+b,0);
  document.getElementById('hlg').innerHTML=`
  <div class="hc hi stagger">
    <div class="hh"><i class="ti ti-trending-up" style="font-size:13px"></i> 3 highlights</div>
    <div class="hi-item"><div class="dot hi"></div><div class="ht"><strong>${sb[0]} leads all revenue</strong><span>${fmtB(bRevs[sb[0]])} total · $${Math.round(nikeAOV)}/unit avg</span></div></div>
    <div class="hi-item"><div class="dot hi"></div><div class="ht"><strong>${sr[0]} is the top region</strong><span>${fmtM(rRevs[sr[0]])} revenue · consistent YoY performance</span></div></div>
    <div class="hi-item"><div class="dot hi"></div><div class="ht"><strong>${sret[0]} leads unit throughput</strong><span>${retU[sret[0]].toLocaleString()} units · ${Math.round(retU[sret[0]]/totalU*100)}% of all units</span></div></div>
  </div>
  <div class="hc lo stagger">
    <div class="hh"><i class="ti ti-alert-triangle" style="font-size:13px"></i> 3 lowlights</div>
    <div class="hi-item"><div class="dot lo"></div><div class="ht"><strong>Puma unit price gap is critical</strong><span>$${Math.round(pumaAOV)}/unit vs $${Math.round(nikeAOV)} Nike · premium SKU review needed</span></div></div>
    <div class="hi-item"><div class="dot lo"></div><div class="ht"><strong>East region underperforms</strong><span>${Math.round(rRevs['East']/total*100)}% of revenue · invest in retailer engagement</span></div></div>
    <div class="hi-item"><div class="dot lo"></div><div class="ht"><strong>Target share is weakest</strong><span>${Math.round(retU['Target']/totalU*100)}% of units · launch exclusive promotions</span></div></div>
  </div>`;
}

render();
</script>
</body>
</html>
